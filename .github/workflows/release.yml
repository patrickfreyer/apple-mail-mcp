name: Release

# Publishes mcp-apple-mail to PyPI via Trusted Publishing (OIDC — no API
# tokens stored in the repo). Triggered by pushing a version tag, e.g.:
#
#     git tag v3.1.7 && git push origin v3.1.7
#
# The build job fails closed if the tag does not match the pyproject version,
# if the version strings drift, or if the wheel is missing the package. Only a
# verified-healthy artifact reaches the publish job.
#
# One-time setup (PyPI side) is documented in RELEASING.md.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build + verify artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Version drift guard
        run: python scripts/check_versions.py

      - name: Guard — git tag must match pyproject version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "tag=$TAG  pyproject=$VER"
          if [ "$TAG" != "$VER" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject version $VER — refusing to publish."
            exit 1
          fi

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify wheel (structure + clean-venv install + entry point)
        run: python scripts/verify_wheel.py

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mcp-apple-mail
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Build .mcpb + attach to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + upload the .mcpb asset
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build the .mcpb bundle
        run: bash apple-mail-mcpb/build-mcpb.sh

      # Same "don't ship a broken artifact" guard as the wheel: the bundle must
      # contain the apple_mail_mcp package and must not leak venv/ or pycache.
      - name: Verify the .mcpb contains the apple_mail_mcp package
        run: |
          MCPB=$(ls apple-mail-mcp-v*.mcpb)
          echo "bundle: $MCPB"
          for f in apple_mail_mcp/__init__.py apple_mail_mcp/__main__.py; do
            if ! unzip -l "$MCPB" | grep -q "$f"; then
              echo "::error::$MCPB is missing $f"; exit 1
            fi
          done
          if unzip -l "$MCPB" | grep -qE '/venv/|__pycache__'; then
            echo "::error::$MCPB leaked venv/ or __pycache__"; exit 1
          fi

      - name: Build release notes from CHANGELOG
        run: python scripts/extract_changelog.py > RELEASE_BODY.md

      - name: Create / update the GitHub Release with the bundle
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_BODY.md
          generate_release_notes: true
          files: apple-mail-mcp-v*.mcpb
          fail_on_unmatched_files: true
